model:
  # Tenyson currently supports Qwen 3 family base models only.
  name: "unsloth/Qwen3-4B-Base"
  # Leave room for the prompt plus a full 2048-token RL completion.
  max_seq_length: 4096
  load_in_4bit: false
  # Lets Unsloth use its fast generation path for GRPO rollouts.
  fast_inference: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  bias: "none"
  # Adjust these if the base model uses different linear layer names.
  target_modules: ["up_proj", "gate_proj", "down_proj"]
  # Unsloth's memory-saving checkpointing mode.
  gradient_checkpointing: "unsloth"

vllm:
  enabled: true
  # Avoid FlashInfer JIT on environments without nvcc (for example T4 Modal images).
  disable_flashinfer: true
  # Fraction of GPU memory reserved for Unsloth's colocated vLLM generation path.
  gpu_memory_utilization: 0.9
  temperature: 1.0
  min_p: 0.1
  top_p: 1.0
  # -1 disables top-k truncation.
  top_k: -1

chat_template:
  # Render RL prompts through the tokenizer's chat template before rollout
  # generation. Reward functions and telemetry still receive raw prompt text.
  enabled: true
  # Leave null to use the tokenizer's default thinking behavior.
  # Set false for direct-answer tasks like arithmetic.
  enable_thinking: null
  # Optional literal stop strings passed into rollout generation. This is
  # useful when a task prefills the start of an assistant reply, like
  # "<answer>", and wants generation to stop after the closing tag.
  stop_strings: []

training:
  # Set to "full" for dense finetuning.
  # The default LoRA path keeps vLLM enabled with model.fast_inference=true.
  # When finetune_mode="full", Tenyson automatically disables:
  #   model.fast_inference
  #   vllm.enabled
  # because Unsloth does not support fast_inference together with
  # full_finetuning=True.
  finetune_mode: "lora"
  seed: 3407
  max_steps: 1000
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  optim: "adamw_8bit"
  # Number of sampled completions per prompt in each GRPO rollout batch.
  num_generations: 4
  # Keep this modest so shorter prompts still leave enough room for long RL completions.
  max_prompt_length: 512
  # Single RL completion-length limit. Reward overlength checks use this same value.
  max_completion_length: 2048
  # Save+push full trainer checkpoints (model + optimizer + scheduler + state) every N steps.
  hf_push_every_steps: 50
