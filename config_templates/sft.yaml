model:
  # Tenyson currently supports Qwen 3 family base models only.
  name: "Qwen/Qwen3-4B"
  max_seq_length: 2048
  load_in_4bit: true
  load_in_8bit: false
  # Keep this off for SFT. Fast inference is for generation-heavy paths like RL/eval.
  fast_inference: false

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  bias: "none"
  # Adjust these if the base model uses different linear layer names.
  target_modules: ["gate_proj", "up_proj", "down_proj"]
  # Unsloth's memory-saving checkpointing mode.
  gradient_checkpointing: "unsloth"

training:
  seed: 123
  max_steps: 3000
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8  # 4 * 8 = 32 global batch size
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 10
  logging_steps: 1
  save_steps: 20
  # When early stopping is enabled, keep this aligned with hf_push_every_steps.
  eval_steps: 20
  save_total_limit: 1
  optim: "adamw_8bit"
  # Packed assistant-only SFT uses Tenyson's built-in row normalization and
  # assistant-mask path. The runtime must still resolve to a safe flash-attention
  # backend; otherwise Tenyson fails fast rather than risk packed-sample leakage.
  packing: false
  # Save+push full trainer checkpoints (model + optimizer + scheduler + state) every N steps.
  hf_push_every_steps: 20
  # For tasks like Wordle, this carves a holdout split out of the training dataset.
  # Set to 0 if the task already provides its own eval dataset.
  val_size: 100
  # Early stopping based on eval_loss: stop if constant or increasing for N evals.
  # Keep eval_steps aligned with hf_push_every_steps so the best checkpoint can be restored exactly.
  early_stopping_patience: 2        # N: number of consecutive evals with no improvement.
  early_stopping_min_delta: 0.0     # X: minimum absolute improvement in eval_loss.
