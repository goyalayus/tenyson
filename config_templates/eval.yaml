evaluation:
  batch_size: 32

chat_template:
  # Render eval prompts through the tokenizer's chat template before
  # generation. Raw prompt text is still preserved for metrics/UI payloads.
  enabled: true
  # Leave null to use the tokenizer's default thinking behavior.
  # Set false for direct-answer tasks like arithmetic.
  enable_thinking: null
  # Optional literal stop strings passed into generation. This is useful when
  # a task prefills the start of an assistant reply, like "<answer>", and
  # wants generation to stop after the closing tag.
  stop_strings: []

model:
  # Tenyson currently supports Qwen 3 family base models only.
  name: "unsloth/qwen3-4b-unsloth-bnb-4bit"
  # When evaluating a stage-produced full model, keep `name` pointed at the
  # Qwen 3 family base and set:
  # init_artifact_type: "full_model"
  # init_model_repo: "<repo>"
  # init_model_revision: "<sha>"
  max_seq_length: 4096
  load_in_4bit: true
  # These should match the adapter shape you expect to load for evaluation.
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: ["up_proj", "gate_proj", "down_proj"]

vllm:
  # Eval now requires the Unsloth/vLLM fast inference path.
  enabled: true
  # Avoid FlashInfer JIT on environments without nvcc (for example T4 Modal images).
  disable_flashinfer: true
  # Fraction of GPU memory reserved for vLLM generation.
  gpu_memory_utilization: 0.9
  temperature: 0.0  # Greedy decoding for evals
  top_p: 1.0
  # Max generation length during evaluation.
  max_tokens: 1024
