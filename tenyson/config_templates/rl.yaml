model:
  name: "unsloth/qwen3-4b-unsloth-bnb-4bit"
  max_seq_length: 4096
  load_in_4bit: true
  fast_inference: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  bias: "none"
  target_modules: ["up_proj", "gate_proj", "down_proj"]
  gradient_checkpointing: "unsloth"

vllm:
  enabled: true
  gpu_memory_utilization: 0.9
  temperature: 1.0
  min_p: 0.1
  top_p: 1.0
  top_k: -1
  max_tokens: 2048

training:
  seed: 3407
  max_steps: 1000
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  optim: "adamw_8bit"
  num_generations: 4
  max_prompt_length: 2048
  max_completion_length: 2048
  # Save+push full trainer checkpoints (model + optimizer + scheduler + state) every N steps.
  hf_push_every_steps: 50

telemetry:
  backend: "wandb"
